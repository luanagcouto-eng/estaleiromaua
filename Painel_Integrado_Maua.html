            const handleSectorChange = (e) => {

        function App() {
            const [view, setView] = useState('login');
            const [gestorId, setGestorId] = useState(managersData[0].id);

            // OKR SHARED STATE (LIFTED)
            const [okrHistory, setOkrHistory] = useState(() => { try { const s = localStorage.getItem('okr_history_2026'); return s ? JSON.parse(s) : OKR_INITIAL_HISTORY; } catch { return OKR_INITIAL_HISTORY; } });
            const [okrSectors, setOkrSectors] = useState(() => { try { const s = localStorage.getItem('okr_sectors_2026'); return s ? JSON.parse(s) : OKR_MOCK_SECTORS; } catch { return OKR_MOCK_SECTORS; } });
            const [okrUsers, setOkrUsers] = useState(() => { try { const s = localStorage.getItem('okr_users_2026c'); return s ? JSON.parse(s) : OKR_MOCK_USERS; } catch { return OKR_MOCK_USERS; } });
            const [okrTeams, setOkrTeams] = useState(() => { try { const s = localStorage.getItem('okr_teams_2026'); return s ? JSON.parse(s) : OKR_INITIAL_TEAMS; } catch { return OKR_INITIAL_TEAMS; } });

            useEffect(() => { localStorage.setItem('okr_history_2026', JSON.stringify(okrHistory)); }, [okrHistory]);
            useEffect(() => { localStorage.setItem('okr_sectors_2026', JSON.stringify(okrSectors)); }, [okrSectors]);
            useEffect(() => { localStorage.setItem('okr_teams_2026', JSON.stringify(okrTeams)); }, [okrTeams]);
            useEffect(() => { localStorage.setItem('okr_users_2026c', JSON.stringify(okrUsers)); }, [okrUsers]);

            const handleUpdateSector = (updated) => setOkrSectors(prev => prev.map(s => s.id === updated.id ? updated : s));
            const handleUpdateUser = (updated) => setOkrUsers(prev => prev.map(u => u.id === updated.id ? updated : u));
            const handleAddUser = (newUser) => setOkrUsers(prev => [...prev, newUser]);
            const handleDeleteUser = (userId) => setOkrUsers(prev => prev.filter(u => u.id !== userId));
            const handleUpdateTeams = (newTeams) => setOkrTeams(newTeams);
            const handleAddEntry = (entry) => setOkrHistory(prev => [...prev, { ...entry, id: `h-${Date.now()}`, timestamp: new Date().toISOString() }]);

            const sharedOkrProps = {
                okrHistory, okrSectors, okrUsers, okrTeams,
                handleUpdateSector, handleUpdateUser, handleAddUser, handleDeleteUser, handleUpdateTeams, handleAddEntry
            };

            useEffect(() => {
                const checkAuth = async () => {
                    try {
                        await msalInstance.handleRedirectPromise();
                        const accounts = msalInstance.getAllAccounts();
                        if (accounts.length > 0 && view === 'login') {
                            const em = accounts[0].username.toLowerCase().trim();
                            if (allowedEmails.some(e => e.toLowerCase().trim() === em)) nav('ceo');
                        }
                    } catch (error) { console.error("Erro de autenticação:", error); }
                };
                checkAuth();
            }, []);

            const nav = (v) => { window.scrollTo(0, 0); setView(v); };

            const props = { navigate: nav, activeManagerId: gestorId, setActiveManager: setGestorId };

            const render = () => {
                if (view === 'login') return <LoginScreen setScreen={nav} />;
                if (view === 'ceo') return <DashboardCEO {...props} />;
                if (view === 'gestor') return <DashboardGestor {...props} />;
                if (view === 'metas') return <MetasScreen {...props} {...sharedOkrProps} />;
                if (view === 'okr') return <OKRFlowScreen {...props} {...sharedOkrProps} />;
                return <LoginScreen setScreen={nav} />;
            };

            return <div className="w-full min-h-screen bg-[#C8C6C4] shadow-inner overflow-x-hidden antialiased">{render()}</div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
